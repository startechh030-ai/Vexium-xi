<svg width="700" height="280" viewBox="0 0 700 280" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Main gradient: crisp ice blue → rich deep blue -->
    <linearGradient id="vexiumGradient" x1="0%" y1="0%" x2="0%" y2="100%" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#D4F8FF" />
      <stop offset="10%" stop-color="#B2F0FF" />
      <stop offset="22%" stop-color="#8FE5FF" />
      <stop offset="35%" stop-color="#68D4FF" />
      <stop offset="48%" stop-color="#3DB8FF" />
      <stop offset="62%" stop-color="#1A94E8" />
      <stop offset="76%" stop-color="#0C6ECF" />
      <stop offset="90%" stop-color="#0850A8" />
      <stop offset="100%" stop-color="#063D8A" />
    </linearGradient>

    <!-- High-gloss shine overlay (brighter at top, fades out) -->
    <linearGradient id="glossShine" x1="0%" y1="0%" x2="0%" y2="100%" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.85" />
      <stop offset="8%" stop-color="#FFFFFF" stop-opacity="0.55" />
      <stop offset="20%" stop-color="#FFFFFF" stop-opacity="0.25" />
      <stop offset="38%" stop-color="#FFFFFF" stop-opacity="0.06" />
      <stop offset="55%" stop-color="#FFFFFF" stop-opacity="0.00" />
      <stop offset="100%" stop-color="#000000" stop-opacity="0.15" />
    </linearGradient>

    <!-- Subtle bottom rim light for dimensional depth -->
    <linearGradient id="bottomRim" x1="0%" y1="0%" x2="0%" y2="100%" gradientUnits="objectBoundingBox">
      <stop offset="75%" stop-color="#FFFFFF" stop-opacity="0" />
      <stop offset="88%" stop-color="#FFFFFF" stop-opacity="0.10" />
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.20" />
    </linearGradient>

    <!-- Soft cyan glow behind the text -->
    <filter id="cyanGlow" x="-5%" y="-10%" width="110%" height="130%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur" />
      <feColorMatrix in="blur" type="matrix" values="
        0 0 0 0 0.2
        0 0 0 0 0.7
        0 0 0 0 0.95
        0 0 0 0.30 0" result="colored" />
      <feMerge>
        <feMergeNode in="colored" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Subtle drop shadow -->
    <filter id="dropShadow" x="-2%" y="-2%" width="104%" height="110%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#042D60" flood-opacity="0.4" />
    </filter>
  </defs>

  <!-- Faint cyan glow behind text -->
  <text 
    x="350" 
    y="170" 
    font-family="'Inter', 'Segoe UI', Arial Black, Helvetica, sans-serif" 
    font-size="196" 
    font-weight="900" 
    fill="#3DB8FF" 
    text-anchor="middle" 
    dominant-baseline="middle" 
    letter-spacing="-6px"
    opacity="0.18"
    filter="url(#cyanGlow)">
    Vexium
  </text>

  <!-- Main text with drop shadow -->
  <g filter="url(#dropShadow)">
    <text 
      x="350" 
      y="170" 
      font-family="'Inter', 'Segoe UI', Arial Black, Helvetica, sans-serif" 
      font-size="196" 
      font-weight="900" 
      fill="url(#vexiumGradient)" 
      text-anchor="middle" 
      dominant-baseline="middle" 
      letter-spacing="-6px"
      paint-order="stroke fill">
      Vexium
    </text>
  </g>

  <!-- Glossy shine overlay -->
  <text 
    x="350" 
    y="170" 
    font-family="'Inter', 'Segoe UI', Arial Black, Helvetica, sans-serif" 
    font-size="196" 
    font-weight="900" 
    fill="url(#glossShine)" 
    text-anchor="middle" 
    dominant-baseline="middle" 
    letter-spacing="-6px"
    opacity="0.85">
    Vexium
  </text>

  <!-- Bottom rim light for premium dimension -->
  <text 
    x="350" 
    y="170" 
    font-family="'Inter', 'Segoe UI', Arial Black, Helvetica, sans-serif" 
    font-size="196" 
    font-weight="900" 
    fill="url(#bottomRim)" 
    text-anchor="middle" 
    dominant-baseline="middle" 
    letter-spacing="-6px">
    Vexium
  </text>

</svg>