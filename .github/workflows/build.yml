name: 🔨 Build & Test

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

  # Allow manual trigger
  workflow_dispatch:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: 🏗️ Build Debug APK & Run Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ── Checkout ──
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      # ── Java ──
      - name: ☕ Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # ── Gradle ──
      - name: 🐘 Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}

      # ── Grant execute permission ──
      - name: 🔑 Grant execute permission for gradlew
        run: chmod +x gradlew

      # ── Lint ──
      - name: 🔍 Run Lint
        run: ./gradlew lintDebug --continue

      # ── Upload Lint report (even if lint fails) ──
      - name: 📋 Upload Lint Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-report
          path: app/build/reports/lint-results-debug.html
          retention-days: 14

      # ── Unit Tests ──
      - name: 🧪 Run Unit Tests
        run: ./gradlew testDebugUnitTest --continue

      # ── Upload Test reports (even if tests fail) ──
      - name: 📋 Upload Test Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: app/build/reports/tests/testDebugUnitTest/
          retention-days: 14

      # ── Build Debug APK ──
      - name: 🔨 Build Debug APK
        run: ./gradlew assembleDebug

      # ── Get APK info ──
      - name: 📏 APK Size
        run: |
          APK_PATH=$(find app/build/outputs/apk/debug -name "*.apk" | head -1)
          APK_SIZE=$(du -h "$APK_PATH" | cut -f1)
          echo "### 📦 APK Info" >> $GITHUB_STEP_SUMMARY
          echo "- **File:** $(basename $APK_PATH)" >> $GITHUB_STEP_SUMMARY
          echo "- **Size:** $APK_SIZE" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY

      # ── Upload Debug APK artifact ──
      - name: 📦 Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: vexium-debug-${{ github.sha }}
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30
          if-no-files-found: error

      # ── Build Summary ──
      - name: ✅ Build Summary
        if: success()
        run: |
          echo "### ✅ Build Successful!" >> $GITHUB_STEP_SUMMARY
          echo "Debug APK is available in the **Artifacts** section above." >> $GITHUB_STEP_SUMMARY

      - name: ❌ Build Failed Summary
        if: failure()
        run: |
          echo "### ❌ Build Failed" >> $GITHUB_STEP_SUMMARY
          echo "Check the **Lint** and **Test** reports in Artifacts for details." >> $GITHUB_STEP_SUMMARY
